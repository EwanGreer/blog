<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Ewan's Blog">
  <meta name="author" content="Ewan Greer">

  <title>{{ .title }}</title>

  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.13/dist/full.min.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.3"
    integrity="sha384-0895/pl2MU10Hqc6jd4RvrthNlDiE9U1tWmX7WRESftEDRosgxNsQG/Ze9YMRzHq"
    crossorigin="anonymous"></script>
</head>

<body class="m-5 flex flex-col min-h-screen text-white font-mono">

  <header class="my-10">
    <h2 class="text-4xl">Ewan's Blog</h2>
    <ul class="mt-1 flex flex-row">
      <li>
        <a class="hover:text-teal-400 hover:underline p-2" href="/">
          home
        </a>
      </li>
      <li>
        <a class="hover:text-teal-400 hover:underline p-2" href="#" onclick="alert('comming soon!')">
          blog
        </a>
      </li>
    </ul>
  </header>

  <main class="flex flex-col items-center justify-center text-white">
    {{ template "content" }}
  </main>

  <footer class="text-white p-4 text-center">
    <p>&copy; Ewan Greer</p>
    <a href="mailto:ewanja.greer@gmail.com" class="hover:underline hover:text-teal-400">ewanja.greer@gmail.com</a>
  </footer>

</body>

</html>
